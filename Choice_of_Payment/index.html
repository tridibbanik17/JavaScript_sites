<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choice of Payment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <input type="checkbox" id="subscribe">
  <label for="subscribe">Subscribe</label><br><br>

  <input type="radio" id="visa" name="card">
  <label for="visa">Visa</label><br>

  <input type="radio" id="paypal" name="card">
  <label for="paypal">Paypal</label><br>

  <input type="radio" id="mastercard" name="card">
  <label for="mastercard">MasterCard</label><br><br>

  <button type="submit" id="mySubmit">Submit</button>

  <p id="subresult"></p>
  <p id="paymentresult"></p>

  <script src="index.js"></script>
</body>
</html>
